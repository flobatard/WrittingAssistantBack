services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  languagetool:
    image: erikvl87/languagetool
    restart: unless-stopped
    environment:
      - Java_Xms=512m
      - Java_Xmx=1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY}/admin/writting-assistant-back:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LANGUAGETOOL_HOST: languagetool
      LANGUAGETOOL_PORT: 8010
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      languagetool:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
